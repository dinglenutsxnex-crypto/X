name: Build Signed APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [release, debug]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Bootstrap Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      # ── Generate throwaway signing keystore (no secrets needed) ──────────
      - name: Generate signing keystore
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -storetype JKS \
            -alias rootdroid \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass rootdroid123 \
            -keypass rootdroid123 \
            -dname "CN=RootDroid, OU=Dev, O=RootDroid, L=Unknown, ST=Unknown, C=US"

      # ── DEBUG ────────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: ./gradlew :app:assembleDebug --no-daemon
        env:
          JAVA_TOOL_OPTIONS: ""

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootdroid-debug-${{ github.sha }}
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── RELEASE ──────────────────────────────────────────────────────────
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          JAVA_TOOL_OPTIONS: ""
          # No signing env vars here — Gradle produces app-release-unsigned.apk
          # The next step handles signing via apksigner

      - name: Sign & zipalign APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: |
          APKSIGNER="$(find "$ANDROID_SDK_ROOT" -name apksigner | grep -v jar | head -1)"
          ZIPALIGN="$(find "$ANDROID_SDK_ROOT" -name zipalign | head -1)"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk

          "$ZIPALIGN" -v 4 "$UNSIGNED" app/build/outputs/apk/release/app-release-aligned.apk

          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-pass pass:rootdroid123 \
            --key-pass pass:rootdroid123 \
            --ks-key-alias rootdroid \
            --out app/build/outputs/apk/release/rootdroid-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          "$APKSIGNER" verify --verbose app/build/outputs/apk/release/rootdroid-signed.apk
          echo "✅ APK signed successfully"

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootdroid-release-${{ github.sha }}
          path: android-app/app/build/outputs/apk/release/rootdroid-signed.apk
          if-no-files-found: error
          retention-days: 90

      # ── Tag → GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/release/rootdroid-signed.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
